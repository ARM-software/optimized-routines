  windows-x86-64-cross:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - { sys: mingw64, base: x86_64, env: cross-mingwarm64, compiler: aarch64-w64-mingw32-gcc }
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - uses: actions/checkout@v4
    - uses: msys2/setup-msys2@v2
      with:
        msystem: ${{matrix.sys}}
        install: mingw-w64-${{matrix.base}}-openssl mingw-w64-${{matrix.base}}-qemu make mingw-w64-${{matrix.env}}-gcc
    - name: configure
      run: cp config.mk.dist config.mk
    - name: make
      run: CC="${{ matrix.compiler }}" USE_GLIBC_ABI=0 make -j
    - name: make check
      run: CC="${{ matrix.compiler }}" USE_GLIBC_ABI=0 EMULATOR="qemu-aarch64-static" make check -j